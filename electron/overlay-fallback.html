<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Overlay Fallback</title>
    <style>
      body { margin: 0; background: transparent; font-family: Inter, Segoe UI, Arial, sans-serif; }
      .overlay { margin: 12px; padding: 10px; border-radius: 10px; background: rgba(17,18,20,.8); color: #f2f3f5; border: 1px solid rgba(255,255,255,.08); }
      .title { font-size: 12px; color: #b5bac1; margin-bottom: 8px; }
      .user { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
      .muted { opacity: .6; }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="title">Voice Overlay</div>
      <div id="list"></div>
    </div>
    <script>
      const { ipcRenderer } = require('electron');
      const list = document.getElementById('list');
      ipcRenderer.on('overlay-state', (_e, state) => {
        const users = state?.participants || [];
        list.innerHTML = users.map(u => `
          <div class="user ${u.isMuted ? 'muted' : ''}">
            <span>${u.name || u.userName || 'User'}</span>
            <span>${u.isMuted ? '🎤 off' : '🎤 on'} ${u.isGlobalAudioMuted ? '🔇' : '🔊'}</span>
          </div>
        `).join('');
      });
    </script>
  </body>
</html>
