<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whithin notifications</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .host {
      display: flex;
      flex-direction: column;
      width: 100%;
      flex: 0 0 auto;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.38);
    }

    .host.is-bottom {
      flex-direction: column-reverse;
    }

    .host.is-bottom .hide-all {
      flex: 0 0 auto;
      border-top: none;
      border-bottom: 1px solid color-mix(in srgb, var(--notif-border, #4f545c) 70%, transparent);
    }

    .hide-all {
      flex: 0 0 auto;
      flex-shrink: 0;
      border: none;
      background: var(--notif-bg, #2f3136);
      color: var(--notif-primary, #5865f2);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.25;
      padding: 12px 14px;
      min-height: 42px;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .hide-all:hover {
      background: color-mix(in srgb, var(--notif-bg, #2f3136) 88%, var(--notif-primary, #5865f2) 12%);
    }

    .list {
      display: flex;
      flex-direction: column;
      flex: 0 0 auto;
      overflow: hidden;
      background: var(--notif-bg, #2f3136);
      border-top: 1px solid color-mix(in srgb, var(--notif-border, #4f545c) 70%, transparent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--notif-border, #4f545c) 80%, transparent);
    }

    .host.is-bottom .list {
      border-top: none;
      border-bottom: 1px solid color-mix(in srgb, var(--notif-border, #4f545c) 70%, transparent);
    }

    .card {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 36px 12px 14px;
      border-top: 1px solid color-mix(in srgb, var(--notif-border, #4f545c) 70%, transparent);
      cursor: pointer;
      text-align: left;
      background: var(--notif-bg, #2f3136);
      transition: background-color 0.15s ease;
    }

    .card:first-child {
      border-top: none;
    }

    .card:hover {
      background: color-mix(in srgb, var(--notif-bg, #2f3136) 90%, var(--notif-text, #dcddde) 10%);
    }

    .close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--notif-text-muted, #8e9297);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      opacity: 0.8;
    }

    .close:hover {
      opacity: 1;
      background: color-mix(in srgb, var(--notif-text, #dcddde) 8%, transparent);
      color: var(--notif-text-muted, #b9bbbe);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      overflow: hidden;
      background: #5865f2;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .body {
      min-width: 0;
      flex: 1;
    }

    .title {
      color: var(--notif-text, #dcddde);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle {
      margin-top: 2px;
      color: var(--notif-primary, #5865f2);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message {
      margin-top: 3px;
      color: var(--notif-text-muted, #8e9297);
      font-size: 13px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    [data-theme-preset='cyberpunk'] .hide-all {
      color: var(--notif-cp-cyan, var(--notif-primary, #6ab2f2));
      text-shadow: var(--notif-cp-glow-cyan, none);
    }

    [data-theme-preset='cyberpunk'] .list {
      box-shadow:
        0 8px 28px rgba(0, 0, 0, 0.5),
        0 0 0 1px var(--notif-cp-red, #ff2a6d);
    }

    [data-theme-preset='cyberpunk'] .card {
      border-top-color: color-mix(in srgb, var(--notif-cp-red, #ff2a6d) 55%, transparent);
    }

    [data-theme-preset='cyberpunk'] .title {
      color: var(--notif-cp-yellow, var(--notif-text, #fff));
      text-shadow: var(--notif-cp-glow-yellow, none);
    }

    [data-theme-preset='cyberpunk'] .subtitle {
      color: var(--notif-cp-cyan, var(--notif-primary, #6ab2f2));
      text-shadow: var(--notif-cp-glow-cyan, none);
    }

    [data-theme-preset='cyberpunk'] .message {
      color: var(--notif-cp-yellow-muted, var(--notif-text-muted, #8b9bab));
    }

    [data-theme-preset='night-city'] .hide-all {
      color: var(--notif-text, #fff);
      text-shadow: var(--notif-nc-text-glow, none);
    }

    [data-theme-preset='night-city'] .title,
    [data-theme-preset='night-city'] .subtitle {
      text-shadow: var(--notif-nc-text-glow, none);
    }
  </style>
</head>
<body>
  <div class="host" id="host" hidden>
    <button type="button" class="hide-all" id="hideAll">Скрыть все</button>
    <div class="list" id="list"></div>
  </div>

  <script>
    const hostEl = document.getElementById('host');
    const listEl = document.getElementById('list');
    const hideAllEl = document.getElementById('hideAll');
    let items = [];
    let lastReportedHeight = 0;
    let lastThemeKey = '';

    function themeKey(theme) {
      if (!theme) return '';
      return JSON.stringify({
        presetId: theme.presetId || '',
        vars: theme.vars || {},
      });
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function applyTheme(theme) {
      if (!theme) return;

      const root = document.documentElement;
      if (theme.presetId) {
        root.setAttribute('data-theme-preset', theme.presetId);
      }

      const vars = theme.vars || {};
      const map = {
        bg: '--notif-bg',
        text: '--notif-text',
        textMuted: '--notif-text-muted',
        primary: '--notif-primary',
        border: '--notif-border',
        cpCyan: '--notif-cp-cyan',
        cpYellow: '--notif-cp-yellow',
        cpYellowMuted: '--notif-cp-yellow-muted',
        cpRed: '--notif-cp-red',
        cpGlowCyan: '--notif-cp-glow-cyan',
        cpGlowYellow: '--notif-cp-glow-yellow',
        ncTextGlow: '--notif-nc-text-glow',
      };

      Object.entries(map).forEach(([key, cssVar]) => {
        const value = vars[key];
        if (value) {
          root.style.setProperty(cssVar, value);
        }
      });
    }

    function renderAvatar(item) {
      const name = item.senderName || item.title || '?';
      const initial = name.charAt(0).toUpperCase();
      const bg = escapeHtml(item.senderAvatarColor || '#5865f2');

      if (item.senderAvatarUrl) {
        return `<div class="avatar" data-initial="${escapeHtml(initial)}" style="background:${bg}"><img src="${escapeHtml(item.senderAvatarUrl)}" alt="" /></div>`;
      }

      return `<div class="avatar" style="background:${bg}">${escapeHtml(initial)}</div>`;
    }

    function buildCardHtml(item) {
      return `
        <article class="card" data-id="${escapeHtml(item.id)}">
          <button type="button" class="close" data-dismiss="${escapeHtml(item.id)}" aria-label="Закрыть">×</button>
          ${renderAvatar(item)}
          <div class="body">
            <div class="title">${escapeHtml(item.title)}</div>
            ${item.subtitle ? `<div class="subtitle">${escapeHtml(item.subtitle)}</div>` : ''}
            <div class="message">${escapeHtml(item.message)}</div>
          </div>
        </article>
      `;
    }

    function syncCards(displayItems) {
      const existingById = new Map();
      for (const card of listEl.querySelectorAll('.card')) {
        existingById.set(card.dataset.id, card);
      }

      const nextIds = new Set(displayItems.map((item) => String(item.id)));
      for (const [id, card] of existingById) {
        if (!nextIds.has(id)) {
          card.remove();
          existingById.delete(id);
        }
      }

      displayItems.forEach((item, index) => {
        const id = String(item.id);
        let card = existingById.get(id);
        if (!card) {
          const wrapper = document.createElement('div');
          wrapper.innerHTML = buildCardHtml(item).trim();
          card = wrapper.firstElementChild;
        }

        if (listEl.children[index] !== card) {
          listEl.insertBefore(card, listEl.children[index] || null);
        }
      });
    }

    function reportHostHeight() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (hostEl.hidden) return;
          const height = Math.ceil(hideAllEl.offsetHeight + listEl.scrollHeight);
          if (height > 0 && height !== lastReportedHeight) {
            lastReportedHeight = height;
            window.notificationHostAPI.reportHeight(height);
          }
        });
      });
    }

    function render() {
      if (!items.length) {
        hostEl.hidden = true;
        listEl.innerHTML = '';
        lastReportedHeight = 0;
        return;
      }

      hostEl.hidden = false;
      const isBottom = hostEl.classList.contains('is-bottom');
      const displayItems = isBottom ? [...items].reverse() : items;
      syncCards(displayItems);
      reportHostHeight();
    }

    listEl.addEventListener('error', (event) => {
      const img = event.target;
      if (!img.matches('.avatar img')) return;

      const avatar = img.closest('.avatar');
      if (!avatar) return;

      const initial = avatar.dataset.initial;
      img.remove();
      if (initial && !avatar.textContent.trim()) {
        avatar.textContent = initial;
      }
    }, true);

    listEl.addEventListener('click', (event) => {
      const dismissId = event.target.closest('[data-dismiss]')?.getAttribute('data-dismiss');
      if (dismissId) {
        event.stopPropagation();
        window.notificationHostAPI.dismiss(dismissId);
        return;
      }

      const card = event.target.closest('.card');
      if (!card) return;
      const id = card.getAttribute('data-id');
      const item = items.find((entry) => String(entry.id) === String(id));
      if (item) {
        window.notificationHostAPI.open(item);
      }
    });

    hideAllEl.addEventListener('click', () => {
      window.notificationHostAPI.dismissAll();
    });

    window.notificationHostAPI.onData((data) => {
      const nextThemeKey = themeKey(data?.theme);
      if (data?.theme && nextThemeKey !== lastThemeKey) {
        applyTheme(data.theme);
        lastThemeKey = nextThemeKey;
      }
      const position = data?.position || 'top-right';
      hostEl.classList.toggle('is-bottom', String(position).startsWith('bottom'));
      items = Array.isArray(data?.items) ? data.items : [];
      render();
    });
  </script>
</body>
</html>
